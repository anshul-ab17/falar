name: Deploy Falar Landing Page to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'falar-web/**' # Trigger only when website files are changed
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: 'falar-web/package-lock.json'

      - name: Install Dependencies
        run: |
          cd falar-web
          npm ci

      - name: Build Static Export
        run: |
          cd falar-web
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: falar-web/out # Next.js static output directory
          branch: gh-pages # Target branch for Pages hosting
          clean: true
